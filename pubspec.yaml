name: integra_app
description: Plataforma de Gestão de Clínicas Universitárias de Práticas Integrativas e Complementares em Saúde.
version: 1.0.0+1

environment:
  sdk: '>=3.4.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  firebase_core: ^3.0.0
  firebase_auth: ^5.0.0
  cloud_firestore: ^5.0.0
  geolocator: ^13.0.0
  image_picker: ^1.0.0
  dio: ^5.0.0
  flutter_bloc: ^8.0.0
  permission_handler: ^11.0.0
  pdf: ^3.0.0
  fl_chart: ^0.66.0
  intl: ^0.19.0
  go_router: ^14.0.0
  cupertino_icons: ^1.0.6
  google_fonts: ^6.2.1
  path_provider: ^2.1.3
  path: ^1.9.0
  open_filex: ^4.5.0
  flutter_map: ^8.3.0
  latlong2: 0.9.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/images/
    - assets/fonts/
